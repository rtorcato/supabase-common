name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, release, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.skip-check.outputs.should-skip }}
    steps:
      - name: Check for skip CI
        id: skip-check
        run: |
          if [[ "${{ github.event.head_commit.message }}" =~ \[(ci skip|skip ci)\] ]]; then
            echo "should-skip=true" >> $GITHUB_OUTPUT
          else
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

  dependencies:
    runs-on: ubuntu-latest
    needs: check-skip
    if: needs.check-skip.outputs.should-skip != 'true'
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Generate cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: 📦 Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🔍 Run linting
        run: pnpm check

      - name: 🧹 Check for unused files, exports, and dependencies
        run: pnpm knip

  typecheck:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      # Build first so cross-package imports (supabase-next → supabase-common's
      # dist .d.ts via its exports map) resolve during typecheck.
      - name: 🏗️ Build packages
        run: pnpm build

      - name: 🔍 Type check
        run: pnpm -r run typecheck

  test:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🧪 Run tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [dependencies, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🏗️ Build packages
        run: pnpm build

      - name: 🔍 Validate packages with publint
        run: pnpm --filter "./packages/*" exec publint --strict

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            packages/*/package.json
            packages/*/README.md
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: [dependencies, lint, typecheck, test, build, check-skip]
    if: needs.check-skip.outputs.should-skip != 'true' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # RELEASE_TOKEN (admin PAT) lets the Changesets action push the
          # "Version Packages" PR / version commit past branch protection;
          # GITHUB_TOKEN can't. Falls back to GITHUB_TOKEN when no PAT is set.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # Build so `changeset publish`'s `npm publish` ships each package's dist
      # (files: ["dist"]). Provenance comes from the root .npmrc (provenance=true)
      # + id-token: write.
      - name: 🏗️ Build packages
        run: pnpm build

      # OIDC trusted publishing needs npm CLI >= 11.5.1; the runner ships 10.x.
      - name: 📦 Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: 🚀 Changesets — version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
